<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelVault</title>
    <link rel="shortcut icon" href="/circles_flickr_images_line_neon_icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="header">
        <h1 id="description"><span><img id="image-icon" src="/images_icon.svg" alt="image icon"></span> PixelVault</h1>
        <div class="search-bar">
            <input id="search" type="search" placeholder="Search images...">
            <button id="submit" type="submit">Search</button>
        </div>        
        </div>
    </header>
    <main id="main">
        <div class="image-container">
            <!-- Images will be dynamically loaded here -->
        </div>
    </main>
    <footer id="footer">
        <p>&copy; <span id="year"></span>. &reg; All Rights Reserved.</p>
        <a id="unsplash-link" href="https://unsplash.com" target="_blank"    style="color:#fff; text-decoration:underline;"><img id="unsplash" src="/unsplash_icon.svg" alt=""> Unsplash</a>
    </footer>    
    <script type="module" src="main.js"></script>
</body>
</html>
